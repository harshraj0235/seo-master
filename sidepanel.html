<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Master</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/sidepanel.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="panel-header" id="panel-header">
    <div class="header-brand">
      <div class="logo-icon" id="logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="url(#logoGrad)" stroke-width="2"/>
          <path d="M8 15c0-2.2 1.8-4 4-4s4 1.8 4 4" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="8" r="1.5" fill="url(#logoGrad)"/>
          <circle cx="12" cy="12" r="3" stroke="url(#logoGrad)" stroke-width="1.5" opacity="0.4"/>
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="24" y2="24">
              <stop stop-color="#00d4ff"/>
              <stop offset="1" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="header-text">
        <h1 class="header-title">SEO Master</h1>
        <p class="header-subtitle" id="page-url">Analyzing page...</p>
      </div>
    </div>
    <button class="theme-toggle-btn" id="theme-toggle-btn" title="Toggle light/dark mode">
      <svg class="theme-icon theme-icon-dark" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="3.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M8 1.5v1.5M8 13v1.5M1.5 8H3M13 8h1.5M3.3 3.3l1 1M11.7 11.7l1 1M3.3 12.7l1-1M11.7 4.3l1-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <svg class="theme-icon theme-icon-light" width="16" height="16" viewBox="0 0 16 16" fill="none" style="display:none;">
        <path d="M14 9.3A6 6 0 0 1 6.7 2 6 6 0 1 0 14 9.3z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="refresh-btn" id="refresh-btn" title="Re-analyze page">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M14 8A6 6 0 1 1 8 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M10 2L8 4l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" transform="rotate(-45 8 2)"/>
      </svg>
    </button>
  </header>

  <!-- ── Tab Navigation ──────────────────────────────────── -->
  <nav class="tab-nav" id="tab-nav">
    <button class="tab-btn active" data-tab="overview" id="tab-btn-overview">
      <svg class="tab-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
        <rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
        <rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
        <rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
      </svg>
      <span>Overview</span>
    </button>
    <button class="tab-btn" data-tab="onpage" id="tab-btn-onpage">
      <svg class="tab-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 2h10a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.3"/>
        <path d="M5 5h6M5 8h4M5 11h5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <span>On-Page</span>
    </button>
    <button class="tab-btn" data-tab="technical" id="tab-btn-technical">
      <svg class="tab-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M6.5 1.5l-1 2.5L3 5l2.5 1 1 2.5 1-2.5L10 5 7.5 4l-1-2.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
        <path d="M11 8l-.7 1.8L8.5 10.5l1.8.7.7 1.8.7-1.8 1.8-.7-1.8-.7L11 8z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
        <path d="M3.5 10l-.5 1.2-1.2.5 1.2.5.5 1.3.5-1.3 1.2-.5-1.2-.5-.5-1.2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
      </svg>
      <span>Technical</span>
    </button>
    <button class="tab-btn" data-tab="content" id="tab-btn-content">
      <svg class="tab-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M4 2h8a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.3"/>
        <path d="M6 5h4M6 7.5h4M6 10h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <span>Content</span>
    </button>
    <button class="tab-btn" data-tab="competitor" id="tab-btn-competitor">
      <svg class="tab-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 13V7l3-2v8M6 13V5l4-3v11M11 13V6l3-2v9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Competitor</span>
    </button>
    <button class="tab-btn" data-tab="aigeo" id="tab-btn-aigeo">
      <svg class="tab-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.3"/>
        <path d="M8 4v4l3 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        <circle cx="8" cy="8" r="1" fill="currentColor"/>
      </svg>
      <span>AI/GEO</span>
    </button>
    <button class="tab-btn" data-tab="rank" id="tab-btn-rank">
      <svg class="tab-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 14h12M4 14V8M8 14V4M12 14v-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M4 8l4-4 4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Rank</span>
    </button>
    <button class="tab-btn" data-tab="bulk" id="tab-btn-bulk">
      <svg class="tab-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="3" width="12" height="10" rx="1" stroke="currentColor" stroke-width="1.3"/>
        <path d="M5 8h6M5 10h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <span>Bulk</span>
    </button>
    <button class="tab-btn" data-tab="export" id="tab-btn-export">
      <svg class="tab-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 10v3h10v-3M8 2v8M5 7l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Export</span>
    </button>
  </nav>

  <!-- ── Tab Content Panels ──────────────────────────────── -->
  <main class="tab-content" id="tab-content">
    <!-- Overview Tab -->
    <section class="tab-panel active" id="panel-overview">
      <div class="loading-state" id="overview-loading">
        <div class="skeleton-scores">
          <div class="skeleton-gauge"></div>
          <div class="skeleton-gauge"></div>
          <div class="skeleton-gauge"></div>
          <div class="skeleton-gauge"></div>
        </div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card short"></div>
      </div>
      <div class="panel-content" id="overview-content" style="display:none;"></div>
    </section>

    <!-- On-Page Tab -->
    <section class="tab-panel" id="panel-onpage">
      <div class="loading-state" id="onpage-loading">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card short"></div>
      </div>
      <div class="panel-content" id="onpage-content" style="display:none;"></div>
    </section>

    <!-- Technical Tab -->
    <section class="tab-panel" id="panel-technical">
      <div class="loading-state" id="technical-loading">
        <div class="skeleton-scores">
          <div class="skeleton-gauge"></div>
          <div class="skeleton-gauge"></div>
          <div class="skeleton-gauge"></div>
        </div>
        <div class="skeleton-card"></div>
      </div>
      <div class="panel-content" id="technical-content" style="display:none;"></div>
    </section>

    <!-- Content Tab -->
    <section class="tab-panel" id="panel-content-tab">
      <div class="loading-state" id="content-loading">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
      <div class="panel-content" id="content-tab-content" style="display:none;"></div>
    </section>

    <!-- Competitor Tab -->
    <section class="tab-panel" id="panel-competitor">
      <div class="loading-state" id="competitor-loading">
        <div class="skeleton-card"></div>
      </div>
      <div class="panel-content" id="competitor-content" style="display:none;"></div>
    </section>

    <!-- AI/GEO Tab -->
    <section class="tab-panel" id="panel-aigeo">
      <div class="loading-state" id="aigeo-loading">
        <div class="skeleton-gauge"></div>
        <div class="skeleton-card"></div>
      </div>
      <div class="panel-content" id="aigeo-content" style="display:none;"></div>
    </section>

    <!-- Rank Tracker Tab -->
    <section class="tab-panel" id="panel-rank">
      <div class="panel-content" id="rank-content" style="display:none;"></div>
    </section>

    <!-- Bulk Audit Tab -->
    <section class="tab-panel" id="panel-bulk">
      <div class="panel-content" id="bulk-content" style="display:none;"></div>
    </section>

    <!-- Export Tab -->
    <section class="tab-panel" id="panel-export">
      <div class="panel-content" id="export-content"></div>
    </section>
  </main>

  <!-- ── Scripts ─────────────────────────────────────────── -->
  <script src="utils/schema-validator.js"></script>
  <script src="modules/overview.js"></script>
  <script src="modules/onpage.js"></script>
  <script src="modules/technical.js"></script>
  <script src="modules/content-audit.js"></script>
  <script src="modules/competitor.js"></script>
  <script src="modules/ai-geo.js"></script>
  <script src="modules/rank-tracker.js"></script>
  <script src="modules/bulk-audit.js"></script>
  <script src="modules/export.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
